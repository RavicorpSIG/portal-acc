<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Acciones Correctivas — Ravicorp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0e14;
  --surf:     #13161f;
  --surf2:    #1a1e2a;
  --border:   #252a38;
  --accent:   #5b8dee;
  --warn:     #f0a500;
  --danger:   #e05555;
  --ok:       #38c98a;
  --text:     #dde1ed;
  --sub:      #8892a4;
  --mono:     'DM Mono', monospace;
  --sans:     'Sora', sans-serif;
  --radius:   10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  font-size: 14px;
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 999;
  transition: opacity .4s;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-size: 12px; color: var(--sub); font-family: var(--mono); }

/* ── LOGIN ── */
#loginWrap {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(91,141,238,.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 20%, rgba(56,201,138,.05) 0%, transparent 70%),
    var(--bg);
}
.login-card {
  width: 100%; max-width: 400px;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  box-shadow: 0 24px 60px rgba(0,0,0,.4);
}
.login-logo {
  display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
}
.login-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #3a6fce);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.login-title { font-size: 17px; font-weight: 600; }
.login-sub   { font-size: 12px; color: var(--sub); margin-top: 2px; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 11px; color: var(--sub); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 7px; }
.field input {
  width: 100%; background: var(--surf2);
  border: 1px solid var(--border); color: var(--text);
  padding: 11px 14px; border-radius: 8px;
  font-size: 14px; font-family: var(--sans); outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(91,141,238,.12);
}
.btn-login {
  width: 100%; background: var(--accent); color: #fff;
  border: none; padding: 12px; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: var(--sans); letter-spacing: .3px;
  transition: filter .2s, transform .1s;
}
.btn-login:hover { filter: brightness(1.1); }
.btn-login:active { transform: scale(.98); }
.btn-login:disabled { opacity: .5; cursor: default; }
.login-err { color: var(--danger); font-size: 12px; margin-top: 12px; display: none; text-align: center; }

/* ── APP ── */
#app { display: none; }

/* HEADER */
.topbar {
  position: sticky; top: 0; z-index: 90;
  background: rgba(12,14,20,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-icon {
  width: 30px; height: 30px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), #3a6fce);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.topbar h1 { font-size: 14px; font-weight: 600; }
.topbar-area {
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 12px;
  font-size: 11px; color: var(--accent); font-family: var(--mono);
}
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-ts { font-size: 11px; color: var(--sub); font-family: var(--mono); }
.btn-sm {
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 14px; border-radius: 7px;
  font-size: 12px; cursor: pointer; font-family: var(--sans);
  transition: border-color .2s; white-space: nowrap;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

/* CONTENIDO */
.content { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

/* KPIs */
.kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
@media(max-width:700px){ .kpis { grid-template-columns: repeat(2,1fr); } }
.kpi {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.kpi.total::before { background: var(--accent); }
.kpi.pend::before  { background: var(--warn); }
.kpi.proc::before  { background: var(--accent); opacity: .5; }
.kpi.cerr::before  { background: var(--ok); }
.kpi-lbl { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.kpi-val { font-size: 36px; font-weight: 600; font-family: var(--mono); line-height: 1; }
.kpi.total .kpi-val { color: var(--text); }
.kpi.pend  .kpi-val { color: var(--warn); }
.kpi.proc  .kpi-val { color: var(--accent); }
.kpi.cerr  .kpi-val { color: var(--ok); }

/* TOOLBAR */
.toolbar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.toolbar select, .toolbar input {
  background: var(--surf); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 8px;
  font-size: 13px; font-family: var(--sans); outline: none;
  transition: border-color .2s;
}
.toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }
.toolbar input { min-width: 220px; }

/* TABLA */
.tbl-card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.tbl-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.tbl-head h2 { font-size: 13px; font-weight: 600; }
.tbl-head span { font-size: 11px; color: var(--sub); font-family: var(--mono); }

.tbl-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th {
  font-size: 10px; font-weight: 500; color: var(--sub);
  text-transform: uppercase; letter-spacing: .7px;
  padding: 11px 14px; text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap; background: var(--surf);
}
td { padding: 12px 14px; border-bottom: 1px solid #1a1e28; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(91,141,238,.03); }

.cell-id    { font-family: var(--mono); font-size: 11px; color: var(--sub); }
.cell-fecha { font-family: var(--mono); font-size: 11px; white-space: nowrap; }
.cell-punto { max-width: 240px; line-height: 1.45; font-size: 12px; color: #bcc4d4; }
.cell-desc  { max-width: 180px; font-size: 11px; color: var(--sub); line-height: 1.4; }

/* BADGE ESTATUS */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 500; font-family: var(--mono);
  white-space: nowrap;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; }
.b-pend { background: rgba(240,165,0,.12);  color: var(--warn);   }
.b-pend::before  { background: var(--warn); }
.b-proc { background: rgba(91,141,238,.12); color: var(--accent); }
.b-proc::before  { background: var(--accent); }
.b-cerr { background: rgba(56,201,138,.12); color: var(--ok);     }
.b-cerr::before  { background: var(--ok); }

/* INPUTS INLINE */
.ei {
  background: transparent; border: none;
  border-bottom: 1px dashed var(--border);
  color: var(--text); font-size: 12px; font-family: var(--sans);
  width: 100%; min-width: 130px; outline: none; padding: 3px 2px;
  transition: border-color .2s;
}
.ei:focus { border-bottom-color: var(--accent); }
.ei:disabled { opacity: .35; cursor: default; }
.ei[type=date] { min-width: 110px; color-scheme: dark; }

.sel-est {
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px;
  padding: 5px 8px; font-size: 11px; font-family: var(--mono);
  outline: none; cursor: pointer; transition: border-color .2s;
}
.sel-est:focus { border-color: var(--accent); }
.sel-est:disabled { opacity: .35; cursor: default; }
.sel-est.s-pend { color: var(--warn); }
.sel-est.s-proc { color: var(--accent); }
.sel-est.s-cerr { color: var(--ok); }

.btn-guardar {
  background: transparent; border: 1px solid var(--ok);
  color: var(--ok); padding: 5px 12px; border-radius: 6px;
  font-size: 11px; font-family: var(--mono); cursor: pointer;
  transition: background .2s; white-space: nowrap;
}
.btn-guardar:hover { background: rgba(56,201,138,.1); }
.btn-guardar:disabled { opacity: .3; cursor: default; }
.saving { opacity: .5; pointer-events: none; }

/* EMPTY */
.empty { text-align: center; padding: 56px 20px; }
.empty-ico { font-size: 36px; margin-bottom: 12px; }
.empty p { font-size: 13px; color: var(--sub); }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 11px 20px; border-radius: 8px;
  font-size: 13px; display: none; z-index: 300;
  background: var(--surf); border: 1px solid var(--border);
  animation: slideUp .2s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
#toast.ok  { border-color: var(--ok);     color: var(--ok); }
#toast.err { border-color: var(--danger); color: var(--danger); }
#toast.inf { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Cargando portal…</p>
</div>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">📋</div>
      <div>
        <div style="font-size:10px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);margin-bottom:3px">Ravicorp</div>
        <div class="login-title">Seguimiento de Acciones Correctivas</div>
        <div class="login-sub">Control BPM — Acceso para líderes de proceso</div>
      </div>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="inUser" placeholder="tu.usuario" autocomplete="username"
             onkeydown="if(event.key==='Enter') document.getElementById('inPass').focus()">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="inPass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" id="btnLogin" onclick="login()">Ingresar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">📋</div>
      <div>
        <h1>Seguimiento de Acciones Correctivas</h1>
        <div style="font-size:10px;color:var(--sub);letter-spacing:.5px;margin-top:1px">RAVICORP · BPM</div>
      </div>
      <span class="topbar-area" id="topArea"></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-ts" id="ts"></span>
      <button class="btn-sm" onclick="cargarHallazgos()">⟳ Actualizar</button>
      <button class="btn-sm danger" onclick="logout()">Salir</button>
    </div>
  </div>

  <!-- Contenido -->
  <div class="content">
    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi total"><div class="kpi-lbl">Total</div><div class="kpi-val" id="kT">—</div></div>
      <div class="kpi pend"> <div class="kpi-lbl">Pendiente</div><div class="kpi-val" id="kP">—</div></div>
      <div class="kpi proc"> <div class="kpi-lbl">En Proceso</div><div class="kpi-val" id="kE">—</div></div>
      <div class="kpi cerr"> <div class="kpi-lbl">Cerrado</div><div class="kpi-val" id="kC">—</div></div>
    </div>

    <!-- Filtros -->
    <div class="toolbar">
      <select id="fEst" onchange="render()">
        <option value="">Todos los estatus</option>
        <option value="Pendiente">Pendiente</option>
        <option value="En Proceso">En Proceso</option>
        <option value="Cerrado">Cerrado</option>
      </select>
      <input type="text" id="fBus" placeholder="Buscar punto, descripción o acción…" oninput="render()">
    </div>

    <!-- Tabla -->
    <div class="tbl-card">
      <div class="tbl-head">
        <h2>Hallazgos asignados a tu área</h2>
        <span id="cnt"></span>
      </div>
      <div class="tbl-scroll">
        <div id="tbl"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  ÚNICA VARIABLE QUE DEBES CONFIGURAR:
//  URL del Apps Script desplegado como Web App
//  (Implementar → Nueva implementación → Aplicación web
//   Ejecutar como: Tú | Quién accede: Cualquier usuario)
// ══════════════════════════════════════════════════════════════
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzap8aKVfD27hS-UQXlxLh1gbZa9b39dzpMZis9mtrGZSUFfhj4m6yQhykaCS4HpTah/exec";

// ══════════════════════════════════════════════════════════════

let sesion    = null;   // { usuario, area, token, nombre }
let hallazgos = [];     // datos cargados del Sheet

// ── INICIO ────────────────────────────────────────────────────
window.onload = function() {
  const s = sessionStorage.getItem("acc_sesion");
  if (s) {
    try {
      sesion = JSON.parse(s);
      mostrarApp();
      cargarHallazgos();
      return;
    } catch(e) {}
  }
  ocultar("loading");
  mostrarFlex("loginWrap");
};

// ── LOGIN ─────────────────────────────────────────────────────
async function login() {
  const usuario = document.getElementById("inUser").value.trim();
  const pass    = document.getElementById("inPass").value;
  const errEl   = document.getElementById("loginErr");
  const btnEl   = document.getElementById("btnLogin");

  errEl.style.display = "none";
  if (!usuario || !pass) {
    errEl.textContent = "Completa usuario y contraseña.";
    errEl.style.display = "block"; return;
  }

  btnEl.disabled = true; btnEl.textContent = "Verificando…";

  try {
    const url = WEB_APP_URL + "?action=login&usuario=" +
                encodeURIComponent(usuario) + "&pass=" + encodeURIComponent(pass);
    const r = await fetch(url);
    const d = await r.json();

    if (!d.ok) {
      errEl.textContent = d.error || "Error al iniciar sesión.";
      errEl.style.display = "block";
    } else {
      sesion = { usuario: d.usuario, area: d.area, token: d.token, nombre: d.nombre };
      sessionStorage.setItem("acc_sesion", JSON.stringify(sesion));
      mostrarApp();
      cargarHallazgos();
    }
  } catch(e) {
    errEl.textContent = "No se pudo conectar con el servidor.";
    errEl.style.display = "block";
  }

  btnEl.disabled = false; btnEl.textContent = "Ingresar";
}

function logout() {
  sessionStorage.removeItem("acc_sesion");
  sesion = null; hallazgos = [];
  ocultar("app");
  mostrarFlex("loginWrap");
  document.getElementById("inUser").value = "";
  document.getElementById("inPass").value = "";
}

function mostrarApp() {
  ocultar("loading"); ocultar("loginWrap");
  document.getElementById("app").style.display = "block";
  document.getElementById("topArea").textContent = sesion.area;
}

// ── CARGAR HALLAZGOS ──────────────────────────────────────────
async function cargarHallazgos() {
  toast("Cargando hallazgos…", "inf");
  try {
    const url = WEB_APP_URL + "?action=getHallazgos&usuario=" +
                encodeURIComponent(sesion.usuario) + "&token=" +
                encodeURIComponent(sesion.token);
    const r = await fetch(url);
    const d = await r.json();

    if (!d.ok) {
      if (d.error && d.error.includes("expirada")) logout();
      toast(d.error || "Error al cargar datos.", "err"); return;
    }

    hallazgos = d.hallazgos || [];
    actualizarKPIs();
    render();
    document.getElementById("ts").textContent =
      "Actualizado: " + new Date().toLocaleTimeString("es-SV");

  } catch(e) {
    toast("Error de conexión: " + e.message, "err");
  }
}

// ── KPIs ──────────────────────────────────────────────────────
function actualizarKPIs() {
  document.getElementById("kT").textContent = hallazgos.length;
  document.getElementById("kP").textContent = hallazgos.filter(h => h.estatus === "Pendiente").length;
  document.getElementById("kE").textContent = hallazgos.filter(h => h.estatus === "En Proceso").length;
  document.getElementById("kC").textContent = hallazgos.filter(h => h.estatus === "Cerrado").length;
}

// ── RENDER TABLA ──────────────────────────────────────────────
function render() {
  const fEst = document.getElementById("fEst").value;
  const fBus = document.getElementById("fBus").value.toLowerCase();

  const datos = hallazgos.filter(h => {
    const mEst = !fEst || h.estatus === fEst;
    const mBus = !fBus ||
      (h.punto       || "").toLowerCase().includes(fBus) ||
      (h.descripcion || "").toLowerCase().includes(fBus) ||
      (h.accion      || "").toLowerCase().includes(fBus);
    return mEst && mBus;
  });

  document.getElementById("cnt").textContent = datos.length + " registro(s)";

  if (!datos.length) {
    document.getElementById("tbl").innerHTML =
      `<div class="empty"><div class="empty-ico">✅</div><p>Sin hallazgos con los filtros actuales.</p></div>`;
    return;
  }

  let html = `<table><thead><tr>
    <th>ID</th><th>Fecha</th><th>Punto que no cumple</th><th>Descripción</th>
    <th>Acción Correctiva</th><th>Responsable</th><th>F. Compromiso</th>
    <th>Evidencia Cierre</th><th>Estatus</th><th></th>
  </tr></thead><tbody>`;

  datos.forEach(function(h, i) {
    const locked = h.estatus === "Cerrado";
    const bClass = h.estatus === "Pendiente" ? "b-pend"
                 : h.estatus === "En Proceso" ? "b-proc" : "b-cerr";
    const sClass = h.estatus === "Pendiente" ? "s-pend"
                 : h.estatus === "En Proceso" ? "s-proc" : "s-cerr";

    html += `<tr>
      <td class="cell-id">${esc(h.idacc)}</td>
      <td class="cell-fecha">${esc(h.fecha)}</td>
      <td class="cell-punto">${esc(h.punto)}</td>
      <td class="cell-desc">${esc(h.descripcion) || '—'}</td>
      <td><input class="ei" id="ac_${i}" value="${esc(h.accion)}"
          placeholder="Describe la acción…" ${locked?'disabled':''}></td>
      <td><input class="ei" id="rs_${i}" value="${esc(h.responsable)}"
          placeholder="Nombre…" style="min-width:100px" ${locked?'disabled':''}></td>
      <td><input class="ei" id="fc_${i}" type="date" value="${isoFecha(h.fechaComp)}"
          ${locked?'disabled':''}></td>
      <td><input class="ei" id="ec_${i}" value="${esc(h.evidenciaCierre)}"
          placeholder="URL o descripción…" ${locked?'disabled':''}></td>
      <td>
        <select class="sel-est ${sClass}" id="se_${i}"
          onchange="colorSelect(this)" ${locked?'disabled':''}>
          <option ${ h.estatus==='Pendiente' ?'selected':''}>Pendiente</option>
          <option ${ h.estatus==='En Proceso'?'selected':''}>En Proceso</option>
          <option ${ h.estatus==='Cerrado'   ?'selected':''}>Cerrado</option>
        </select>
      </td>
      <td>
        <button class="btn-guardar" id="bg_${i}"
          onclick="guardar(${i}, ${h.rowIndex})" ${locked?'disabled':''}>
          Guardar
        </button>
      </td>
    </tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("tbl").innerHTML = html;
}

function colorSelect(sel) {
  sel.className = "sel-est " +
    (sel.value==="Pendiente" ? "s-pend" : sel.value==="En Proceso" ? "s-proc" : "s-cerr");
}

// ── GUARDAR FILA via Web App (doPost) ─────────────────────────
async function guardar(idx, rowIndex) {
  const btn = document.getElementById("bg_" + idx);
  btn.disabled = true; btn.textContent = "…";

  const payload = {
    usuario:         sesion.usuario,
    token:           sesion.token,
    rowIndex:        rowIndex,
    accion:          document.getElementById("ac_" + idx).value,
    responsable:     document.getElementById("rs_" + idx).value,
    fechaCompromiso: document.getElementById("fc_" + idx).value,
    evidenciaCierre: document.getElementById("ec_" + idx).value,
    estatus:         document.getElementById("se_" + idx).value,
  };

  try {
    const r = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // evita preflight CORS
      body: JSON.stringify(payload)
    });
    const d = await r.json();

    if (!d.ok) {
      toast(d.error || "Error al guardar.", "err");
    } else {
      toast("✓ Guardado correctamente.", "ok");
      // Actualizar dato local y refrescar fila si se cerró
      const h = hallazgos.find(x => x.rowIndex === rowIndex);
      if (h) {
        h.accion          = payload.accion;
        h.responsable     = payload.responsable;
        h.fechaComp       = payload.fechaCompromiso;
        h.evidenciaCierre = payload.evidenciaCierre;
        h.estatus         = payload.estatus;
      }
      actualizarKPIs();
      if (payload.estatus === "Cerrado") render();
    }
  } catch(e) {
    toast("Error de conexión: " + e.message, "err");
  }

  btn.disabled = false; btn.textContent = "Guardar";
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/"/g,"&quot;")
    .replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function isoFecha(s) {
  // Convierte dd/MM/yyyy → yyyy-MM-dd para input[type=date]
  if (!s) return "";
  const p = s.split("/");
  if (p.length === 3) return p[2] + "-" + p[1] + "-" + p[0];
  return s;
}

function toast(msg, tipo) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = tipo;
  t.style.display = "block";
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.display = "none"; }, 3500);
}

function ocultar(id)     { document.getElementById(id).style.display = "none"; }
function mostrarFlex(id) { document.getElementById(id).style.display = "flex"; }
</script>
